      - generic [ref=e518]:
        - heading "About our Instagram status page integration" [level=3] [ref=e519]
        - generic [ref=e520]:
          - paragraph [ref=e521]: Instagram (Social media platform for sharing photos and videos) is a a Social Media solution that StatusGator has been monitoring since October 2024. Over the past over 1 year, we have collected data on on outages that affected Instagram users. When Instagram users report issues, we collect that data and provide a comprehensive view of the service's status history.
          - paragraph [ref=e522]: If you're wondering, "Is Instagram down?", or need to know its current status, we've got you covered. Our platform tracks every reported outage, performance issue, and maintenance window to ensure you're informed. Whether Instagram is experiencing a problem now or has recently resolved one, our detailed history keeps you updated.
          - paragraph [ref=e523]: More than 100 StatusGator users monitor Instagram to get notified when it's down, is under maintenance, or has an outage. This makes it one of the most popular Social Media services monitored on our platform. We've sent more than 100 notifications to our users about Instagram incidents, providing transparency and peace of mind.
